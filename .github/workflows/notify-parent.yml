name: Notify Parent of Update

on:
  push:
    branches: [ main, auto-updater ]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Check for new transforms
        id: check_changes
        run: |
          # 1. Identify added files
          NEW_FILES=$(git diff-tree --no-commit-id --name-status -r ${{ github.sha }} | grep '^A' | awk '{print $2}' | grep -E '\.(ctl)$' || true)

          # 2. Build the JSON array (will be [] if empty)
          echo "[" > payload.json
          FIRST=true
          for FILE in $NEW_FILES; do
            if [ "$FIRST" = false ]; then echo "," >> payload.json; fi
            
            # Extract tags using sed
            T_ID=$(sed -n 's/.*<ACEStransformID>\(.*\)<\/ACEStransformID>.*/\1/p' "$FILE")
            U_NAME=$(sed -n 's/.*<ACESuserName>\(.*\)<\/ACESuserName>.*/\1/p' "$FILE")
            
            # If tags are missing, use filename as fallback
            T_ID=${T_ID:-"unknown_id"}
            U_NAME=${U_NAME:-"$FILE"}

            # Debug line - REMOVE
            echo "{\"file\": \"$FILE\", \"id\": \"$T_ID\", \"user\": \"$U_NAME\"}"
            
            echo "{\"file\": \"$FILE\", \"id\": \"$T_ID\", \"user\": \"$U_NAME\"}" >> payload.json
            FIRST=false
          done
          echo "]" >> payload.json

          # 3. Export as a single line for the dispatch
          echo "TRANSFORMS_DATA=$(cat payload.json | jq -c .)" >> $GITHUB_OUTPUT
          echo "FOUND=true" >> $GITHUB_OUTPUT

      - name: Repository Dispatch
        if: steps.check_changes.outputs.FOUND == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PARENT_REPO_PAT }}
          repository: scottdyer/aces
          event-type: submodule_update
          client-payload: |
            {
              "submodule": "aces-input-and-colorspaces",
              "sha": "${{ github.sha }}",
              "new_transforms": ${{ steps.check_changes.outputs.TRANSFORMS_DATA }}
            }
